<svg width="520" height="160" viewBox="0 0 520 160" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Genau logo</title>
  <desc>Genau wordmark in deep forest green with German flag stripe accent and checkmark badge</desc>

  <!-- Flag stripe -->
  <rect x="0" y="12" width="7" height="20" fill="#1A1A1A" rx="1"/>
  <rect x="0" y="34" width="7" height="20" fill="#CC0000" rx="1"/>
  <rect x="0" y="56" width="7" height="20" fill="#FFCC00" rx="1"/>

  <!-- Wordmark -->
  <text x="20" y="82"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="86"
    font-weight="700"
    letter-spacing="-1"
    fill="#2D6A4F">Genau</text>

  <!-- Checkmark badge -->
  <rect x="342" y="12" width="48" height="26" rx="13" fill="#2D6A4F"/>
  <text x="366" y="31"
    font-family="sans-serif"
    font-size="14"
    font-weight="700"
    text-anchor="middle"
    fill="#FFFFFF">✓</text>

  <!-- Tagline -->
  <text x="20" y="112"
    font-family="Georgia, serif"
    font-size="13"
    letter-spacing="3.5"
    fill="#2D6A4F">DEUTSCH LERNEN</text>
</svg>
